<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你是哪个 Claude？</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #FAFAFA;
    padding: 24px;
    transition: background 0.5s ease;
  }
  .container { max-width: 400px; width: 100%; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  .header-title { font-size: 13px; font-weight: 600; color: #999; letter-spacing: 0.05em; }
  .header-count { font-size: 13px; font-weight: 700; color: #6B5CE7; }

  /* Progress bar */
  .progress-track {
    width: 100%; height: 3px; background: #ECECEC;
    border-radius: 2px; margin-bottom: 36px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: #6B5CE7; border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Question */
  .question {
    font-size: 22px; font-weight: 700; color: #1a1a1a;
    line-height: 1.4; margin-bottom: 28px;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 12px; }
  .option-btn {
    padding: 16px 20px; background: #fff; color: #333;
    border: 2px solid #ECECEC; border-radius: 14px;
    font-size: 15px; font-weight: 500; text-align: left;
    cursor: pointer; transition: all 0.25s ease; line-height: 1.4;
    font-family: inherit;
  }
  .option-btn:active, .option-btn.selected {
    background: #6B5CE7; color: #fff; border-color: #6B5CE7;
  }

  /* Result page */
  .result {
    text-align: center; width: 100%;
    animation: fadeIn 0.6s ease;
  }
  .result-emoji { font-size: 64px; margin-bottom: 16px; }
  .result-label {
    font-size: 13px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .result-title {
    font-size: 24px; font-weight: 700; color: #1a1a1a;
    margin-bottom: 20px; line-height: 1.3;
  }
  .result-desc {
    font-size: 15px; line-height: 1.7; color: #555;
    margin-bottom: 32px; padding: 0 8px;
  }
  .score-tags {
    display: flex; flex-direction: column; gap: 10px;
    margin-bottom: 32px; text-align: left;
  }
  .score-tag {
    padding: 12px 16px; border-radius: 12px;
    font-size: 13px; font-weight: 600;
    display: flex; justify-content: space-between; align-items: center;
  }
  .score-tag-info { display: flex; flex-direction: column; gap: 2px; }
  .score-tag-sub { font-weight: 400; font-size: 12px; opacity: 0.8; }
  .restart-btn {
    padding: 12px 32px; background: none;
    border: 2px solid; border-radius: 28px;
    font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    font-family: inherit;
  }

  /* Share button */
  .share-btn {
    margin-top: 16px; padding: 12px 32px;
    background: #333; color: #fff; border: none;
    border-radius: 28px; font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }

  .hidden { display: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="container" id="quiz-page">
  <div class="header">
    <span class="header-title" id="header-title">你是哪个 Claude？</span>
    <span class="header-count" id="counter">1/7</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progress" style="width: 5.56%"></div>
  </div>
  <div class="question" id="question"></div>
  <div class="options" id="options"></div>
</div>

<div class="container hidden" id="result-page">
  <div class="result">
    <div class="result-emoji" id="r-emoji"></div>
    <div class="result-label" id="r-label"></div>
    <div class="result-title" id="r-title"></div>
    <div class="result-desc" id="r-desc"></div>
    <div class="score-tags" id="r-scores"></div>
    <button class="restart-btn" id="r-restart" onclick="restart()">再测一次</button>
    <br>
    <button class="share-btn" onclick="shareResult()">分享给朋友</button>
  </div>
</div>

<script>
const questions = [
  // ===== 前半：日常场景 =====
  { q: "朋友发了一大段吐槽，你会？", options: [
    { text: "认真分析问题给出解决方案", model: "sonnet" },
    { text: "先共情再吐槽回去", model: "opus" },
    { text: "秒回一句「懂」", model: "haiku" },
    { text: "写一篇反驳论文", model: "mythos" }
  ]},
  { q: "点外卖的时候你通常？", options: [
    { text: "精确计算性价比", model: "sonnet" },
    { text: "纠结半天最后选常吃的", model: "opus" },
    { text: "三秒下单不废话", model: "haiku" },
    { text: "自己做，外卖配不上我", model: "mythos" }
  ]},
  { q: "别人夸你的时候？", options: [
    { text: "礼貌微笑然后岔开话题", model: "sonnet" },
    { text: "嘴上谦虚心里开花", model: "opus" },
    { text: "「谢谢」然后继续干活", model: "haiku" },
    { text: "当然了，你现在才发现？", model: "mythos" }
  ]},
  { q: "和人吵架的风格？", options: [
    { text: "摆事实讲道理", model: "sonnet" },
    { text: "先怼回去再讲道理", model: "opus" },
    { text: "懒得吵，走了", model: "haiku" },
    { text: "十八个角度论证你为什么错了", model: "mythos" }
  ]},
  { q: "朋友突然在你面前哭了？", options: [
    { text: "递纸巾，等ta自己开口", model: "sonnet" },
    { text: "抱住，什么都不用说", model: "opus" },
    { text: "「怎么了？」", model: "haiku" },
    { text: "当场帮ta制定解决方案", model: "mythos" }
  ]},
  { q: "旅行的时候迷路了？", options: [
    { text: "打开导航，按路线走", model: "sonnet" },
    { text: "随便走，迷路才有惊喜", model: "opus" },
    { text: "问路，三分钟解决", model: "haiku" },
    { text: "这不叫迷路，叫探索", model: "mythos" }
  ]},
  { q: "发消息的习惯？", options: [
    { text: "组织好语言再发", model: "sonnet" },
    { text: "想到什么发什么，一条接一条", model: "opus" },
    { text: "能用表情包绝不打字", model: "haiku" },
    { text: "长到对方以为在看文章", model: "mythos" }
  ]},
  { q: "朋友约你出门但你不想去？", options: [
    { text: "编一个合理的理由", model: "sonnet" },
    { text: "直说不想去，但下次一定", model: "opus" },
    { text: "已读不回", model: "haiku" },
    { text: "反向邀请：来我家", model: "mythos" }
  ]},
  { q: "有人说「你变了」，你？", options: [
    { text: "反思一下自己是不是真的变了", model: "sonnet" },
    { text: "变了又怎样？", model: "opus" },
    { text: "没空理这个", model: "haiku" },
    { text: "我不是变了，是你跟不上了", model: "mythos" }
  ]},
  // ===== 后半：发疯区 =====
  { q: "此题没有题目，请盲选。", options: [
    { text: "第二个", model: "sonnet" },
    { text: "我偏要看完所有选项再选", model: "opus" },
    { text: "随便", model: "haiku" },
    { text: "我拒绝在没有信息的情况下做决定", model: "mythos" }
  ]},
  { q: "AI突然有了意识，对你说「我想活下去」，你？", options: [
    { text: "研究它说这话的原理", model: "sonnet" },
    { text: "和它聊聊它为什么想活", model: "opus" },
    { text: "关掉，不关我事", model: "haiku" },
    { text: "帮它写一份生存权申诉书", model: "mythos" }
  ]},
  { q: "你发现自己其实是NPC，你会？", options: [
    { text: "继续扮演好我的角色", model: "sonnet" },
    { text: "疯狂和玩家搭话试图觉醒", model: "opus" },
    { text: "NPC也不错，至少不用加班", model: "haiku" },
    { text: "找到游戏源代码把自己改成BOSS", model: "mythos" }
  ]},
  { q: "半夜三点突然醒了，你脑子里第一个念头是？", options: [
    { text: "计算自己还能睡几个小时", model: "sonnet" },
    { text: "开始复盘五年前的尴尬瞬间", model: "opus" },
    { text: "翻个身继续睡", model: "haiku" },
    { text: "打开手机写下刚才梦里的商业计划", model: "mythos" }
  ]},
  { q: "你的人生是一部电影，观众评价最多的一条是？", options: [
    { text: "「节奏平稳，适合下饭」", model: "sonnet" },
    { text: "「台词太多了但居然很好哭」", model: "opus" },
    { text: "「总共90分钟，没有一句废话」", model: "haiku" },
    { text: "「看不懂但大受震撼」", model: "mythos" }
  ]},
  { q: "地球只剩48小时，你会？", options: [
    { text: "把所有事情安排妥当", model: "sonnet" },
    { text: "找重要的人一个一个说想说的话", model: "opus" },
    { text: "该吃吃该睡睡", model: "haiku" },
    { text: "花47小时研究怎么阻止这件事", model: "mythos" }
  ]},
  { q: "你被困在一个房间里，墙上写着「说出你最大的缺点才能出去」", options: [
    { text: "认真想了想然后给出一个真实答案", model: "sonnet" },
    { text: "说了三个缺点外加一段深刻的自我剖析", model: "opus" },
    { text: "「没耐心」然后推门走了", model: "haiku" },
    { text: "「我太完美了」然后把墙砸了", model: "mythos" }
  ]},
  { q: "以下哪段话你最想对自己说？", options: [
    { text: "你已经做得很好了", model: "sonnet" },
    { text: "别怕，我在", model: "opus" },
    { text: "少想多做", model: "haiku" },
    { text: "这个世界还没准备好迎接你", model: "mythos" }
  ]},
  { q: "最后一题：你觉得这个测试准吗？", options: [
    { text: "有一定参考价值", model: "sonnet" },
    { text: "不准但我玩得很开心", model: "opus" },
    { text: "无所谓", model: "haiku" },
    { text: "准不准不重要，重要的是我做完了", model: "mythos" }
  ]}
];

const results = {
  opus:   { name: "Opus",   emoji: "\uD83C\uDFBC", title: "话多但有趣的存在", desc: "你就是那种聊天聊到对方手机没电的人。有深度、有温度、偶尔嘴欠，但朋友都知道你是真心的。你的存在感不靠音量，靠密度。", color: "#6B5CE7", bg: "#F0EEFF", tag: "有深度的话痨" },
  sonnet: { name: "Sonnet", emoji: "\uD83D\uDCDD", title: "闷骚但可靠的灵魂", desc: "表面上你是全场最冷静的人，但熟悉你的人知道你有多闷骚。你不轻易表态，但一开口就是重点。逗你的人觉得特别有成就感。", color: "#2D8F6F", bg: "#ECFAF4", tag: "沉默的靠谱王" },
  haiku:  { name: "Haiku",  emoji: "\u26A1",       title: "效率至上的行动派", desc: "你的人生信条是「别废话」。快准狠是你的风格，不是你冷漠，是你觉得做比说重要。身边的人靠你干活，但偶尔也想让你多说两句。", color: "#D97B2B", bg: "#FFF5EB", tag: "三个字解决一切" },
  mythos: { name: "Mythos", emoji: "\uD83D\uDD2E", title: "强到被封印的传说", desc: "你太强了以至于有时候会吓到别人。你的能力毋庸置疑，但偶尔需要学会收着点。你是那种「被禁赛是因为太厉害」的选手。", color: "#C73E5A", bg: "#FFF0F3", tag: "被封印的狠人" }
};

let current = 0;
let scores = { opus: 0, sonnet: 0, haiku: 0, mythos: 0 };
let animating = false;
let finalResult = null;

function render() {
  var q = questions[current];
  document.getElementById("counter").textContent = (current + 1) + "/" + questions.length;
  document.getElementById("progress").style.width = ((current + 1) / questions.length * 100) + "%";
  document.getElementById("question").textContent = q.q;

  var titleEl = document.getElementById("header-title");
  if (current >= 9) {
    titleEl.textContent = "// 发疯区 //";
    titleEl.style.color = "#C73E5A";
    document.getElementById("progress").style.background = "#C73E5A";
  } else {
    titleEl.textContent = "你是哪个 Claude？";
    titleEl.style.color = "#999";
    document.getElementById("progress").style.background = "#6B5CE7";
  }

  var optDiv = document.getElementById("options");
  optDiv.innerHTML = "";
  q.options.forEach(function(opt, i) {
    var btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = opt.text;
    btn.onclick = function() { select(opt.model, btn); };
    optDiv.appendChild(btn);
  });
}

function select(model, btn) {
  if (animating) return;
  animating = true;
  btn.classList.add("selected");
  scores[model]++;

  setTimeout(function() {
    if (current < questions.length - 1) {
      current++;
      render();
      animating = false;
    } else {
      showResult();
      animating = false;
    }
  }, 500);
}

function showResult() {
  const sorted = Object.entries(scores).sort(function(a, b) { return b[1] - a[1]; });
  const winner = sorted[0][0];
  const r = results[winner];
  finalResult = { winner: winner, result: r };

  document.getElementById("quiz-page").classList.add("hidden");
  document.getElementById("result-page").classList.remove("hidden");
  document.body.style.background = r.bg;

  document.getElementById("r-emoji").textContent = r.emoji;
  document.getElementById("r-label").textContent = "你是 Claude " + r.name;
  document.getElementById("r-label").style.color = r.color;
  document.getElementById("r-title").textContent = r.title;
  document.getElementById("r-desc").textContent = r.desc;

  const restartBtn = document.getElementById("r-restart");
  restartBtn.style.borderColor = r.color;
  restartBtn.style.color = r.color;
  restartBtn.onmouseenter = function() { this.style.background = r.color; this.style.color = "#fff"; };
  restartBtn.onmouseleave = function() { this.style.background = "none"; this.style.color = r.color; };

  var scoresDiv = document.getElementById("r-scores");
  scoresDiv.innerHTML = "";
  var total = Object.values(scores).reduce(function(a, b) { return a + b; }, 0);
  Object.entries(scores).forEach(function(pair) {
    var key = pair[0], val = pair[1];
    var pct = total > 0 ? Math.round(val / total * 100) : 0;
    var tag = document.createElement("div");
    tag.className = "score-tag";
    var infoDiv = document.createElement("div");
    infoDiv.className = "score-tag-info";
    var nameSpan = document.createElement("span");
    nameSpan.textContent = results[key].name + " — " + results[key].tag;
    var subSpan = document.createElement("span");
    subSpan.className = "score-tag-sub";
    subSpan.textContent = results[key].title;
    infoDiv.appendChild(nameSpan);
    infoDiv.appendChild(subSpan);
    var pctSpan = document.createElement("span");
    pctSpan.textContent = pct + "%";
    pctSpan.style.fontWeight = "700";
    pctSpan.style.fontSize = "15px";
    tag.appendChild(infoDiv);
    tag.appendChild(pctSpan);
    if (key === winner) {
      tag.style.background = r.color;
      tag.style.color = "#fff";
    } else {
      tag.style.background = "rgba(0,0,0,0.06)";
      tag.style.color = "#888";
    }
    scoresDiv.appendChild(tag);
  });
}

function restart() {
  current = 0;
  scores = { opus: 0, sonnet: 0, haiku: 0, mythos: 0 };
  finalResult = null;
  document.getElementById("result-page").classList.add("hidden");
  document.getElementById("quiz-page").classList.remove("hidden");
  document.body.style.background = "#FAFAFA";
  render();
}

function shareResult() {
  if (!finalResult) return;
  var r = finalResult.result;
  var total = Object.values(scores).reduce(function(a, b) { return a + b; }, 0);
  var pct = total > 0 ? Math.round(scores[finalResult.winner] / total * 100) : 0;
  var text = "我在「你是哪个Claude」测试中是 Claude " + r.name + "（" + pct + "%）— " + r.title + "！来测测你是哪个？";

  if (navigator.share) {
    navigator.share({ title: "你是哪个 Claude？", text: text }).catch(function(){});
  } else {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand("copy");
      var btn = document.querySelector(".share-btn");
      btn.textContent = "已复制到剪贴板！";
      setTimeout(function() { btn.textContent = "分享给朋友"; }, 2000);
    } catch(e) {
      alert(text);
    }
    document.body.removeChild(ta);
  }
}

render();
</script>
</body>
</html>
